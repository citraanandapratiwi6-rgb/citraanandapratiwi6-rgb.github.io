<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To‑Do List</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --primary: #2f5564;
      --primary-2: #19647e;
      --accent: #ffb703;
      --text: #1f2a37;
      --muted: #6b7a8f;
      --shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI Emoji",
        "Segoe UI Symbol", sans-serif;
      background: radial-gradient(circle at top, rgba(25, 100, 126, 0.25), transparent 55%),
        var(--bg);
      min-height: 100vh;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .app {
      width: min(520px, 100%);
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    header {
      padding: 28px 26px 22px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      position: relative;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 1.75rem;
      letter-spacing: 0.02em;
    }

    header p {
      margin: 0;
      font-size: 0.95rem;
      opacity: 0.87;
    }

    .controls {
      padding: 22px 26px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .controls input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(31, 42, 55, 0.18);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .controls input:focus {
      border-color: rgba(25, 100, 126, 0.7);
      box-shadow: 0 0 0 3px rgba(25, 100, 126, 0.12);
    }

    .controls button {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s;
    }

    .controls button:active {
      transform: scale(0.97);
      filter: brightness(0.9);
    }

    .list {
      padding: 0 26px 26px;
      min-height: 260px;
    }

    .list:empty {
      padding-top: 40px;
      text-align: center;
      color: var(--muted);
      font-style: italic;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid rgba(31, 42, 55, 0.12);
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 6px 12px rgba(31, 42, 55, 0.05);
      transition: transform 0.15s;
    }

    .task:hover {
      transform: translateY(-1px);
    }

    .task input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary-2);
      cursor: pointer;
    }

    .task label {
      flex: 1;
      font-size: 1rem;
      word-break: break-word;
      cursor: pointer;
      user-select: none;
    }

    .task.completed label {
      color: rgba(31, 42, 55, 0.55);
      text-decoration: line-through;
    }

    .task button {
      border: none;
      background: transparent;
      color: rgba(31, 42, 55, 0.6);
      font-size: 1.05rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    .task button:hover {
      background: rgba(25, 100, 126, 0.12);
    }

    .footer {
      padding: 18px 26px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(31, 42, 55, 0.12);
      background: rgba(255, 255, 255, 0.72);
    }

    .footer small {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .progress-container {
      flex: 1;
      margin: 0 20px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(31, 42, 55, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--primary-2));
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }

    @media (max-width: 480px) {
      header h1 {
        font-size: 1.5rem;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .controls button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main id="app" class="app" aria-label="To-Do List">
    <header>
      <h1>To‑Do List</h1>
      <p>Tambahkan tugas baru, centang saat selesai, dan simpan secara otomatis di browser.</p>
    </header>

    <section class="controls">
      <input id="newTask" type="text" placeholder="Tambahkan tugas baru..." autocomplete="off" />
      <button id="addBtn" type="button">Tambah</button>
    </section>

    <section id="taskList" class="list" aria-label="Daftar tugas"></section>

    <div class="footer">
      <small>Tekan Enter untuk menambahkan tugas.</small>
      <div class="progress-container">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>
      <small id="stats"></small>
    </div>
  </main>

  <script>
    const KEY = "todoList_v1";
    const taskListEl = document.getElementById("taskList");
    const newTaskInput = document.getElementById("newTask");
    const addBtn = document.getElementById("addBtn");
    const statsEl = document.getElementById("stats");
    const progressFill = document.getElementById("progressFill");

    let tasks = [];

    function loadTasks() {
      try {
        const saved = localStorage.getItem(KEY);
        tasks = saved ? JSON.parse(saved) : [];
      } catch (error) {
        tasks = [];
      }
    }

    function saveTasks() {
      localStorage.setItem(KEY, JSON.stringify(tasks));
    }

    function renderTasks() {
      taskListEl.innerHTML = "";

      if (tasks.length === 0) {
        taskListEl.textContent = "Belum ada tugas. Tambahkan tugas di atas.";
        updateStats();
        return;
      }

      tasks.forEach((task) => {
        const item = document.createElement("div");
        item.className = "task" + (task.done ? " completed" : "");
        item.dataset.id = task.id;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.done;
        checkbox.setAttribute("aria-label", "Selesai");

        const label = document.createElement("label");
        label.textContent = task.text;
        const icon = task.done ? "✅" : "📝";
        label.textContent = `${icon} ${task.text}`;

        const editBtn = document.createElement("button");
        editBtn.type = "button";
        editBtn.title = "Edit tugas";
        editBtn.textContent = "✏️";

        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.title = "Hapus tugas";
        deleteBtn.textContent = "🗑";

        item.append(checkbox, label, editBtn, deleteBtn);
        taskListEl.appendChild(item);
      });

      updateStats();
    }

    function updateStats() {
      const total = tasks.length;
      const done = tasks.filter((t) => t.done).length;
      statsEl.textContent = `${done} dari ${total} tugas selesai`;

      const percentage = total > 0 ? (done / total) * 100 : 0;
      progressFill.style.width = `${percentage}%`;
    }

    function addTask(text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      tasks.unshift({ id: Date.now().toString(), text: trimmed, done: false });
      saveTasks();
      renderTasks();
      newTaskInput.value = "";
      newTaskInput.focus();
    }

    function toggleTask(id) {
      const task = tasks.find((t) => t.id === id);
      if (!task) return;
      task.done = !task.done;
      saveTasks();
      renderTasks();
    }

    function editTask(id) {
      const task = tasks.find((t) => t.id === id);
      if (!task) return;

      const item = document.querySelector(`.task[data-id="${id}"]`);
      const label = item.querySelector("label");
      const editBtn = item.querySelector("button[title='Edit tugas']");

      // Buat input field
      const input = document.createElement("input");
      input.type = "text";
      input.value = task.text;
      input.className = "edit-input";
      input.style.flex = "1";
      input.style.fontSize = "1rem";
      input.style.border = "1px solid rgba(25, 100, 126, 0.7)";
      input.style.borderRadius = "8px";
      input.style.padding = "6px 8px";
      input.style.outline = "none";

      // Ganti label dengan input
      label.replaceWith(input);
      input.focus();
      input.select();

      // Fungsi untuk menyimpan
      const saveEdit = () => {
        const newText = input.value.trim();
        if (newText && newText !== task.text) {
          task.text = newText;
          saveTasks();
        }
        // Kembalikan ke label dengan ikon
        input.replaceWith(label);
        const icon = task.done ? "✅" : "📝";
        label.textContent = `${icon} ${task.text}`;
      };

      // Event listeners
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          saveEdit();
        } else if (e.key === "Escape") {
          input.replaceWith(label);
        }
      });

      input.addEventListener("blur", saveEdit);
    }

    addBtn.addEventListener("click", () => addTask(newTaskInput.value));

    newTaskInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        addTask(newTaskInput.value);
      }
    });

    taskListEl.addEventListener("click", (event) => {
      const item = event.target.closest(".task");
      if (!item) return;
      const id = item.dataset.id;

      if (event.target.matches("input[type='checkbox']")) {
        toggleTask(id);
      }

      if (event.target.matches("button[title='Edit tugas']")) {
        editTask(id);
      }

      if (event.target.matches("button[title='Hapus tugas']")) {
        removeTask(id);
      }
    });

    loadTasks();
    renderTasks();
  </script>
</body>
</html>
